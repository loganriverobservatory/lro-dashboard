# ============================================================
# LRO Dashboard — Site & Group Configuration
# ============================================================
# This is the ONE file to edit when station details change —
# names, which sites show up, and which group/color they fall
# under. A script reads this file automatically; you never need
# to touch any code.
#
# NOTE: HydroServer stations are NOT listed here. They come in
# live from HydroServer's own API every time the dashboard loads,
# so new HydroServer sites appear automatically with no edit
# needed. This file only covers stations that DON'T come from a
# live, self-describing API: DWRi (Utah Division of Water Rights)
# and USGS.
# ============================================================


# ------------------------------------------------------------
# WATERWAY GROUPS
# ------------------------------------------------------------
# The top-level groups shown in the sidebar filter and used to
# color stations on the map/list. Every station in this file
# must use a "group" value that exactly matches one of these
# names (case-sensitive).
# ------------------------------------------------------------
waterway_groups:
  - name: "Logan River Observatory"
    color: "#7d98c6"
  - name: "Logan River Observatory: Logan River Main Stem"
    color: "#7d98c6"
  - name: "USGS"
    color: "#d09559"
  - name: "DWRi"
    color: "#6fa26b"


# ------------------------------------------------------------
# SCHEMATIC SUB-GROUPS
# ------------------------------------------------------------
# Used only inside the schematic diagram, to color-code DWRi
# stations by which tributary they belong to. Every DWRi
# station's "schematicGroup" below must match one of these names.
# ------------------------------------------------------------
schematic_groups:
  - name: "Logan River"
    color: "#c98a3c"
  - name: "Little Bear River"
    color: "#4f8fb0"
  - name: "Blacksmith Fork River"
    color: "#8a6fa2"   # placeholder color — change if you'd like a different one


# ------------------------------------------------------------
# HIDDEN STATIONS
# ------------------------------------------------------------
# HydroServer station codes listed here are hidden everywhere in
# the dashboard, without deleting their data.
#
# TO HIDE A STATION: add its code below.
# TO SHOW IT AGAIN: remove its code from this list.
# ------------------------------------------------------------
hidden_stations:
  - "TF_SAWM_A"
  - "SPC_CONF_A"
  - "SLB_600W_CNL"
  - "NWF_1600N_CNL"
  - "LR_RH_SD"
  - "LR_SC_SD"
  - "LR_DSC_A"


# ------------------------------------------------------------
# DISPLAY NAME OVERRIDES (HydroServer stations only)
# ------------------------------------------------------------
# HydroServer identifies stations by a short internal code. This
# maps each code to the human-readable name shown on the
# dashboard.
#
# TO RENAME A STATION: change the text after its code below.
# ------------------------------------------------------------
display_names:
  BC_CONF_A:        "Beaver Creek: Before Confluence with the Logan River"
  BSF_1700S_A:      "Blacksmith Fork River: 1700 South Footbridge"
