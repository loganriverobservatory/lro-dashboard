# ============================================================
# LRO Dashboard — Site & Group Configuration
# ============================================================
# This is the ONE file to edit when station details change —
# names, which sites show up, and which group/color they fall
# under. A script reads this file automatically; you never need
# to touch any code.
#
# NOTE: HydroServer stations are NOT listed here. They come in
# live from HydroServer's own API every time the dashboard loads,
# so new HydroServer sites appear automatically with no edit
# needed. This file only covers stations that DON'T come from a
# live, self-describing API: DWRi (Utah Division of Water Rights)
# and USGS.
# ============================================================


# ------------------------------------------------------------
# WATERWAY GROUPS
# ------------------------------------------------------------
# The top-level groups shown in the sidebar filter and used to
# color stations on the map/list. Every station in this file
# must use a "group" value that exactly matches one of these
# names (case-sensitive).
# ------------------------------------------------------------
waterway_groups:
  - name: "Logan River Observatory"
    color: "#7d98c6"
  - name: "Logan River Observatory: Logan River Main Stem"
    color: "#7d98c6"
  - name: "USGS"
    color: "#d09559"
  - name: "DWRi"
    color: "#6fa26b"


# ------------------------------------------------------------
# SCHEMATIC SUB-GROUPS
# ------------------------------------------------------------
# Used only inside the schematic diagram, to color-code DWRi
# stations by which tributary they belong to. Every DWRi
# station's "schematicGroup" below must match one of these names.
# ------------------------------------------------------------
schematic_groups:
  - name: "Logan River"
    color: "#c98a3c"
  - name: "Little Bear River"
    color: "#4f8fb0"
  - name: "Blacksmith Fork River"
    color: "#8a6fa2"   # placeholder color — change if you'd like a different one


# ------------------------------------------------------------
# HIDDEN STATIONS
# ------------------------------------------------------------
# HydroServer station codes listed here are hidden everywhere in
# the dashboard, without deleting their data.
#
# TO HIDE A STATION: add its code below.
# TO SHOW IT AGAIN: remove its code from this list.
# ------------------------------------------------------------
hidden_stations:
  - "TF_SAWM_A"
  - "SPC_CONF_A"
  - "SLB_600W_CNL"
  - "NWF_1600N_CNL"
  - "LR_RH_SD"
  - "LR_SC_SD"
  - "LR_DSC_A"


# ------------------------------------------------------------
# DISPLAY NAME OVERRIDES (HydroServer stations only)
# ------------------------------------------------------------
# HydroServer identifies stations by a short internal code. This
# maps each code to the human-readable name shown on the
# dashboard.
#
# TO RENAME A STATION: change the text after its code below.
# ------------------------------------------------------------
display_names:
  BC_CONF_A:        "Beaver Creek: Before Confluence with the Logan River"
  BSF_1700S_A:      "Blacksmith Fork River: 1700 South Footbridge"
  BSF_CONF_BA:      "Blacksmith Fork River: Before Confluence with Logan River"
  BSF_Darwin_A:     "Blacksmith Fork River: Hollow Road"
  DS_CONF_A:        "Dewitt Springs: Before Confluence with Logan River"
  LBR_MR_A:         "Little Bear River: Mendon Road"
  LR_1000W_A:       "Logan River: 1000 West"
  LR_Cutler_A:      "Logan River: Before Confluence with Cutler Reservoir"
  LR_FB_BA:         "Logan River: Franklin Basin"
  LR_GCB_A:         "Logan River: Guinavah Campground"
  LR_MainStreet_BA: "Logan River: Main Street"
  LR_Mendon_AA:     "Logan River: Mendon Road"
  LR_TG_BA:         "Logan River: Tony Grove"
  LR_WaterLab_AA:   "Logan River: Utah Water Research Laboratory"
  LR_WC_A:          "Logan River: Above Wood Camp"
  LR_WCB_A:         "Logan River: Wood Camp Bridge"
  RHF_CONF_A:       "Right Hand Fork: Before Confluence with Logan River"
  RS_CONF_A:        "Ricks Spring: Before Confluence with Logan River"
  SC_CONF_A:        "Spring Creek: Before Confluence with Logan River"
  SC_MR_A:          "Spring Creek: Mendon Road"
  TF_CONF_A:        "Temple Fork: Before Confluence with Logan River"
  LR_DSC_A:         "Logan River: Dewitt Springs Campground"


# ------------------------------------------------------------
# USGS STATIONS
# ------------------------------------------------------------
# TO ADD A USGS STATION: find its site number on
# waterdata.usgs.gov, add a new entry below in the same shape.
# TO HIDE ONE: set active: false (don't delete it).
# ------------------------------------------------------------
usgs_stations:
  - id: "10108400"
    displayName: "USGS: Cache Highline Canal Near Logan, UT"
    siteLink: "https://waterdata.usgs.gov/monitoring-location/USGS-10108400/#dataTypeId=continuous-00060-0&period=P7D&showMedian=true&showFieldMeasurements=true"
    active: true

  - id: "10109000"
    displayName: "USGS: Logan River Above First Dam"
    siteLink: "https://waterdata.usgs.gov/monitoring-location/USGS-10109000/#dataTypeId=continuous-00060-0&period=P7D&showMedian=true&showFieldMeasurements=true"
    active: true


