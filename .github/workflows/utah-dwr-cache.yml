name: Update Utah DWRi Cache

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Fetch DWRi data and build station-config.json
        run: python .github/scripts/fetch_dwri.py > /tmp/station-config.json

      - name: Commit to data-cache branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet refs/remotes/origin/data-cache; then
            git checkout data-cache
          else
            git checkout --orphan data-cache
            git rm -rf .
          fi

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/loganriverobservatory/lro-dashboard.git"
          cp /tmp/station-config.json station-config.json
          git add station-config.json
          git diff --staged --quiet || git commit -m "chore: update station config cache $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin data-cache
