name: Validate Station Config

on:
  push:
    paths:
      - 'config/station_config.yaml'
  pull_request:
    paths:
      - 'config/station_config.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Validate station_config.yaml
        run: python .github/scripts/fetch_dwri.py --validate-only
